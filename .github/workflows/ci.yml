name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov ruff numpy pandas scikit-learn streamlit lightgbm xgboost joblib pyarrow
      - name: Lint with ruff
        run: ruff check dashboard/utils dashboard/tests
        continue-on-error: true
      - name: Run pytest
        run: |
          python -m pytest dashboard/tests -v --cov=dashboard/utils --cov-report=term-missing
