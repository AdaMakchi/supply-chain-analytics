<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Présentation Mémoire GE</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111827; font-family: Arial, sans-serif; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
h1 { font-size: 16px; color: #9ca3af; margin-bottom: 16px; }
.slide-box { width: 100%; max-width: 900px; background: #000; border-radius: 10px; overflow: hidden; }
.slide-box img { width: 100%; display: block; }
.controls { display: flex; align-items: center; gap: 16px; margin: 14px 0; }
button { background: #374151; color: white; border: none; border-radius: 8px; padding: 10px 28px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
button:hover:not(:disabled) { background: #4b5563; }
button:disabled { opacity: 0.3; cursor: default; }
.counter { font-size: 15px; color: #d1d5db; min-width: 70px; text-align: center; }
.thumbs { display: flex; flex-wrap: wrap; gap: 6px; max-width: 900px; justify-content: center; margin-top: 10px; }
.thumb { width: 75px; cursor: pointer; border-radius: 5px; overflow: hidden; border: 2px solid transparent; opacity: 0.55; transition: all 0.15s; }
.thumb:hover { opacity: 0.9; }
.thumb.active { border-color: #6366f1; opacity: 1; }
.thumb img { width: 100%; display: block; }
.thumb span { display: block; text-align: center; font-size: 10px; color: #6b7280; padding: 2px 0; }
</style>
</head>
<body>
<h1>Présentation Mémoire GE &mdash; 38 slides</h1>
<div class="slide-box"><img id="main" src="slide-01.jpg" alt="Slide 1"></div>
<div class="controls">
  <button id="prev" onclick="go(-1)" disabled>&#8592; Précédent</button>
  <span class="counter"><span id="num">1</span> / 38</span>
  <button id="next" onclick="go(1)">Suivant &#8594;</button>
</div>
<div class="thumbs" id="thumbs"></div>
<script>
const total = 38;
let cur = 0;
const main = document.getElementById('main');
const num = document.getElementById('num');
const prev = document.getElementById('prev');
const next = document.getElementById('next');
const thumbsDiv = document.getElementById('thumbs');

function pad(n) { return String(n).padStart(2,'0'); }

function render() {
  main.src = `slide-${pad(cur+1)}.jpg`;
  num.textContent = cur + 1;
  prev.disabled = cur === 0;
  next.disabled = cur === total - 1;
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i===cur));
  document.querySelectorAll('.thumb')[cur].scrollIntoView({block:'nearest', inline:'nearest'});
}

function go(d) { cur = Math.max(0, Math.min(total-1, cur+d)); render(); }

for (let i = 0; i < total; i++) {
  const div = document.createElement('div');
  div.className = 'thumb' + (i===0?' active':'');
  div.innerHTML = `<img src="slide-${pad(i+1)}.jpg" loading="lazy"><span>${i+1}</span>`;
  div.onclick = () => { cur = i; render(); };
  thumbsDiv.appendChild(div);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') go(1);
  if (e.key === 'ArrowLeft') go(-1);
});
</script>
</body>
</html>
